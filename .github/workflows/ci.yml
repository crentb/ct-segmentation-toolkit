# Continuous Integration for ct-segmentation-toolkit.
#
# On every push / PR to main, across Python 3.10-3.12:
#   install -> ruff (lint) -> black (format check) -> mypy (advisory) -> pytest+coverage.
# Then a second job builds the Docker image and runs the suite inside it.
# A green run certifies the package installs cleanly, imports, is lint/format-clean,
# and passes its tests on three Python versions and in a container.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, format & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (core + dev extras; viz stack excluded)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type-check (mypy; advisory, non-blocking)
        run: mypy -p ct_seg
        continue-on-error: true

      - name: Tests (pytest; 'slow' tests skipped) with coverage
        run: pytest -m "not slow" --cov --cov-report=term-missing

  docker-build:
    name: Container image builds & runs
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build the image
        run: docker build -t ct-segmentation-toolkit:ci .
      - name: Smoke-test (run the fast suite inside the container)
        run: docker run --rm ct-segmentation-toolkit:ci pytest -m "not slow"
